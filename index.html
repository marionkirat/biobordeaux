<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioBordeaux — Le guide indépendant du bio à Bordeaux Métropole</title>
  <meta name="description" content="Le guide indépendant des adresses bio de Bordeaux Métropole : épiceries, restaurants, marchés, producteurs, paniers, vrac et bien-être." />
  <style>
    :root {
      --green: #3a7d44;
      --green-light: #e8f5e9;
      --green-mid: #a5d6a7;
      --brown: #795548;
      --text: #2e2e2e;
      --muted: #6b7280;
      --bg: #f9faf7;
      --card-bg: #ffffff;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* HEADER */
    header {
      background: var(--green);
      color: white;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: var(--green-mid); }
    header p { margin-top: 0.4rem; opacity: 0.85; font-size: 0.95rem; }

    /* SEARCH & FILTERS */
    .controls {
      max-width: 900px;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 0.6rem 0.75rem 0.6rem 2.2rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--green); }
    .search-wrap::before {
      content: "🔍";
      position: absolute;
      left: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
    }
    .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .filters button {
      padding: 0.4rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: white;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
    }
    .filters button:hover, .filters button.active {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    /* GRID */
    .grid {
      max-width: 900px;
      margin: 1.5rem auto 3rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border-top: 4px solid var(--green);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .card h2 { font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
    .cat-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: var(--green-light);
      color: var(--green);
      white-space: nowrap;
    }
    .card .address { font-size: 0.82rem; color: var(--muted); }
    .card .desc { font-size: 0.88rem; line-height: 1.5; flex: 1; }
    .eco-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .eco-tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.25rem; }
    .note { font-size: 0.82rem; color: var(--brown); font-weight: 600; }
    .card a {
      font-size: 0.78rem;
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }
    .card a:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 1rem; grid-column: 1/-1; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>

<header>
  <h1>🌿 Bio<span>Bordeaux</span></h1>
  <p>Le guide indépendant des adresses bio de Bordeaux Métropole</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Rechercher une adresse, une commune…" oninput="render()" />
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="grid" id="grid"></div>

<footer>
  BioBordeaux · Guide indépendant · Dernière mise à jour automatique
</footer>

<script>
const CATS = {
  restaurant: "Restaurant",
  supermarche: "Épicerie / Supermarché",
  marche: "Marché",
  producteur: "Producteur",
  panier: "Panier / AMAP",
  vin: "Vins bios",
  bienetre: "Bien-être",
  cosmetique: "Cosmétique",
  maison: "Maison / Entretien",
  assos: "Association"
};

const ECO_LABELS = {
  ab: "🌾 Label AB",
  local: "📍 Circuit court",
  vrac: "♻️ Vrac",
  ecotable: "🍽️ Écotable",
  veggie: "🥦 Veggie"
};

const PLACES = [
  { id: 1, nom: "Les Récoltants", cat: "restaurant", commune: "bordeaux", adresse: "18 Rue Sainte-Colombe, 33000 Bordeaux", desc: "Restaurant bio et marché fermier, du champ à l'assiette en moins de 20 km. Label Écotable 3 macarons, cuisine de saison avec des petits producteurs engagés.", web: "https://www.lesrecoltants.fr", eco: ["ab", "local", "ecotable"], note: 4.7 },
  { id: 2, nom: "Marché Biologique des Quais", cat: "marche", commune: "bordeaux", adresse: "33 Quai des Chartrons, 33000 Bordeaux", desc: "Marché 100 % bio chaque jeudi matin de 6h à 14h : fruits, légumes, vins, fromages, viandes, poissons, miel et bien plus, proposés par une vingtaine de producteurs.", web: "https://www.marchesdegironde.com/marche-bio-quais-bordeaux", eco: ["ab", "local"], note: 4.6 },
  { id: 3, nom: "Aux Petits Poids", cat: "supermarche", commune: "bordeaux", adresse: "260 Cours de la Somme, 33800 Bordeaux", desc: "Épicerie bio et vrac de quartier (60 m², 1 400 références dont 800 en vrac) au cœur de Nansouty. Environ 90 % de produits biologiques, priorité à la proximité.", web: "https://www.auxpetitspoids.fr", eco: ["ab", "vrac", "local"], note: 4.5 },
  { id: 4, nom: "L'Éco Pin", cat: "supermarche", commune: "bordeaux", adresse: "48 Rue de la Compagnie du Midi, 33800 Bordeaux", desc: "Épicerie bio éco-responsable avec cantine conviviale, spécialisée en produits locaux certifiés AB et Nature & Progrès. Vrac, fruits & légumes, et cuisine de saison.", web: "https://lecopin.fr", eco: ["ab", "local", "vrac"], note: 4.5 },
];

let activeFilter = "all";

function stars(note) {
  if (!note) return "";
  const full = Math.round(note);
  return "★".repeat(full) + "☆".repeat(5 - full) + ` ${note.toFixed(1)}`;
}

function buildFilters() {
  const used = [...new Set(PLACES.map(p => p.cat))];
  const wrap = document.getElementById("filters");
  wrap.innerHTML = "";
  const all = document.createElement("button");
  all.textContent = "Tout";
  all.className = activeFilter === "all" ? "active" : "";
  all.onclick = () => { activeFilter = "all"; buildFilters(); render(); };
  wrap.appendChild(all);
  used.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = CATS[cat] || cat;
    btn.className = activeFilter === cat ? "active" : "";
    btn.onclick = () => { activeFilter = cat; buildFilters(); render(); };
    wrap.appendChild(btn);
  });
}

function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const grid = document.getElementById("grid");
  let items = PLACES.filter(p => {
    const matchCat = activeFilter === "all" || p.cat === activeFilter;
    const matchQ = !q ||
      p.nom.toLowerCase().includes(q) ||
      (p.commune || "").toLowerCase().includes(q) ||
      (p.adresse || "").toLowerCase().includes(q) ||
      (p.desc || "").toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (!items.length) {
    grid.innerHTML = '<p class="empty">Aucune adresse trouvée pour ces critères.</p>';
    return;
  }

  grid.innerHTML = items.map(p => `
    <div class="card">
      <div class="card-header">
        <h2>${p.nom}</h2>
        <span class="cat-badge">${CATS[p.cat] || p.cat}</span>
      </div>
      <p class="address">📍 ${p.adresse}</p>
      <p class="desc">${p.desc}</p>
      ${p.eco && p.eco.length ? `<div class="eco-tags">${p.eco.map(e => `<span class="eco-tag">${ECO_LABELS[e] || e}</span>`).join("")}</div>` : ""}
      <div class="card-footer">
        <span class="note">${p.note ? stars(p.note) : ""}</span>
        ${p.web ? `<a href="${p.web}" target="_blank" rel="noopener">Voir le site →</a>` : ""}
      </div>
    </div>
  `).join("");
}

buildFilters();
render();
</script>
</body>
</html>
